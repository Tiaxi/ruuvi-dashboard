services:
  collector:
    build: ./collector
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-8000}:8000"
    volumes:
      - ./config:/config
      - ./dashboards:/dashboards
      - /var/run/dbus:/var/run/dbus
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DASHBOARD_TITLE=${DASHBOARD_TITLE:-Ruuvi Dashboard}
      - DASHBOARD_PATH=/dashboards/ruuvi.json
    depends_on:
      - victoriametrics

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    restart: unless-stopped
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
      - /etc/localtime:/etc/localtime:ro
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=${VM_RETENTION:-1y}"
      - "-httpListenAddr=:8428"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s${GRAFANA_SUBPATH:-/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GRAFANA_SUBPATH:+true}
      - GF_BRANDING_APP_TITLE=${DASHBOARD_TITLE:-Ruuvi Dashboard}
      - GF_AUTH_DISABLE_SIGNOUT_MENU=true
    depends_on:
      - victoriametrics

volumes:
  vmdata:
  grafana_data:
